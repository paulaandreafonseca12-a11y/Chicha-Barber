{% extends "base-login.html" %}
{% load static %}

{% block content %}

<div class="background-decor">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
</div>

<div class="main-wrapper mx-auto">

    <!-- HEADER -->
    <header class="text-center mb-4">
        <div class="logo-wrap rounded-circle overflow-hidden mx-auto mb-2">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="w-100 h-100 object-fit-cover">
        </div>
        <h1 class="brand-name text-white">CHICHA BARBER</h1>
        <span class="brand-sub small text-uppercase text-white">Studio · Nobsa</span>
    </header>

    <!-- CAJA -->
    <main class="form-box p-4 rounded-3 text-center">

        <!-- ICONO -->
        <div class="success-icon rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3">
            ✓
        </div>

        <h2 class="form-heading text-white mb-1">¡Cambio Exitoso!</h2>

        <p class="small text-white opacity-50 mb-4">
            Tu contraseña ha sido actualizada correctamente.<br>
            Ahora puedes iniciar sesión con tus nuevos datos.
        </p>

        <a href="{% url 'login' %}" class="btn btn-auth w-100 d-block">
            INICIAR SESIÓN
        </a>

    </main>

</div>

{% endblock content %}
