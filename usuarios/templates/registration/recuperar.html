{% extends "base-login.html" %}
{% load static %}

{% block content %}

<div class="background-decor">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
</div>

<div class="main-wrapper">

    <!-- HEADER -->
    <header class="header-brand">

        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="Logo">
        </div>

        <h1 class="brand-name">CHICHA BARBER</h1>
        <span class="brand-sub">Studio · Nobsa</span>

    </header>

    <!-- FORMULARIO -->
    <main class="form-box">

        <h2 class="form-heading">Recuperar</h2>

        <p class="form-sub">
            Ingresa tu correo para recibir las instrucciones.
        </p>

        <form method="post">

            {% csrf_token %}

            <!-- EMAIL -->
            <label class="cb-label">
                Correo Electrónico
            </label>

            <div class="input-wrap">

                <span class="input-icon">
                    ✉️
                </span>

                <input
                    type="email"
                    name="email"
                    class="cb-input"
                    placeholder="correo@ejemplo.com"
                    autocomplete="email"
                    required
                >

            </div>

            <!-- BOTÓN -->
            <button type="submit" class="btn-auth">
                ENVIAR INSTRUCCIONES
            </button>

        </form>

        <!-- VOLVER -->
        <div class="aux-text">

            <a href="{% url 'login' %}" class="aux-link">
                ← Volver al inicio de sesión
            </a>

        </div>

    </main>

</div>

{% endblock content %}
