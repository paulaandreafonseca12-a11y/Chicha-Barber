{% extends "base-login.html" %}
{% load static %}

{% block content %}

<div class="background-decor">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
</div>

<div class="main-wrapper mx-auto">

    <!-- HEADER -->
    <header class="header-brand">

        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="Logo">
        </div>

        <h1 class="brand-name text-white">CHICHA BARBER</h1>
        <span class="brand-sub text-white">Studio · Nobsa</span>

    </header>

    <!-- LOGIN -->
    <main class="form-box">

        <h2 class="form-heading text-white">Inicia Sesión</h2>
        <p class="form-sub text-white">Bienvenido a la experiencia premium</p>

        <!-- ERRORES -->
        {% if form.errors %}
            <div class="auth-alert">
                Correo o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post">

            {% csrf_token %}

            <!-- EMAIL -->
            <label class="cb-label">Correo Electrónico</label>

            <div class="input-wrap">

                <span class="input-icon">
                    ✉️
                </span>

                <input
                    type="email"
                    name="username"
                    class="cb-input"
                    placeholder="correo@ejemplo.com"
                    autocomplete="email"
                    required
                >

            </div>

            <!-- PASSWORD -->
            <label class="cb-label">Contraseña</label>

            <div class="input-wrap">

                <span class="input-icon">
                    🔒
                </span>

                <input
                    type="password"
                    name="password"
                    class="cb-input"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >

            </div>

            <!-- RECUPERAR -->
            <div class="forgot-link-wrap">

                <a href="{% url 'password_reset' %}" class="forgot-link">
                    ¿Olvidaste tu contraseña?
                </a>

            </div>

            <!-- BOTÓN -->
            <button type="submit" class="btn-auth">
                INGRESAR
            </button>

        </form>

        

        </div>

    </main>

</div>

{% endblock content %}
