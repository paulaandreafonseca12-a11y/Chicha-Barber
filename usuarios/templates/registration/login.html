{% extends "base-login.html" %}
{% load static %}

{% block content %}

<div class="background-decor">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
</div>

<div class="main-wrapper mx-auto">

    <!-- HEADER -->
    <header class="text-center mb-4">
        <div class="logo-wrap rounded-circle overflow-hidden mx-auto mb-2">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="w-100 h-100 object-fit-cover">
        </div>
        <h1 class="brand-name text-white">CHICHA BARBER</h1>
        <span class="brand-sub small text-uppercase text-white">Studio · Nobsa</span>
    </header>

    <!-- LOGIN -->
    <main class="form-box p-4 rounded-3">
        <h2 class="form-heading text-white mb-1">Inicia Sesión</h2>
        <p class="small text-white opacity-50 mb-3">Bienvenido a la experiencia premium</p>

        <!-- ERRORES -->
        {% if form.errors %}
        <div class="alert auth-alert mb-3">
            Correo o contraseña incorrectos.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">

            <!-- EMAIL -->
            <label class="form-label cb-label">Correo Electrónico</label>
            <div class="position-relative mb-3">
                <span class="input-icon">✉️</span>
                <input
                    type="email"
                    name="username"
                    id="id_username"
                    class="cb-input"
                    placeholder="correo@ejemplo.com"
                    autocomplete="email"
                    required
                >
            </div>

            <!-- PASSWORD -->
            <label class="form-label cb-label">Contraseña</label>
            <div class="position-relative mb-2">
                <span class="input-icon">🔒</span>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    class="cb-input"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >
            </div>

            <!-- RECUPERAR -->
            <div class="text-end mb-1">
                <a href="{% url 'password_reset' %}" class="forgot-link">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <!-- BOTÓN -->
            <button type="submit" class="btn btn-auth w-100 mt-3">
                INGRESAR
            </button>
        </form>
    </main>

</div>

<!-- 🔥 NUEVO: Script para evitar espacios o mayúsculas incorrectas en tiempo real -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const inputEmail = document.getElementById('id_username');
    const inputPassword = document.getElementById('id_password');

    // Control de formato para el correo
    if (inputEmail) {
        inputEmail.addEventListener('input', function() {
            this.value = this.value.toLowerCase().replace(/\s/g, '');
        });
    }

    // Control de formato para la contraseña (sin espacios accidentales)
    if (inputPassword) {
        inputPassword.addEventListener('input', function() {
            this.value = this.value.replace(/\s/g, '');
        });
    }
});
</script>

{% endblock content %}
