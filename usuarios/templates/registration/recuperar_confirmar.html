{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña</title>

    <!-- SOLO STATIC (como te exigen) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.2">
</head>

<body>

<div class="background-decor">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
</div>

<div class="main-wrapper">

    <header class="header-brand">
        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="logo">
        </div>
        <h1 class="brand-name">CHICHA BARBER</h1>
        <span class="brand-sub">Studio · Nobsa</span>
    </header>

    <main class="form-box">

        <h2 class="form-heading">Nueva Contraseña</h2>
        <p class="form-sub">Crea una clave segura para tu cuenta</p>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="auth-alert">
                    Por favor verifica los datos ingresados.
                </div>
            {% endif %}

            <label class="cb-label">Nueva contraseña</label>
            <div class="input-wrap">
                {{ form.new_password1 }}
            </div>

            <label class="cb-label">Confirmar contraseña</label>
            <div class="input-wrap">
                {{ form.new_password2 }}
            </div>

            <button type="submit" class="btn-auth">
                GUARDAR CONTRASEÑA
            </button>
        </form>

    </main>

</div>

</body>
</html>
