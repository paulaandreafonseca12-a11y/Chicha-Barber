{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chicha Barber - Nueva Clave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="back">
    <div class="main-container d-flex justify-content-center align-items-center vh-100"> 
        <div class="login-card p-5 shadow-lg text-center" style="background: rgba(0,0,0,0.8); border-radius: 15px;">
            <h2 class="text-white text-uppercase fw-bold mb-4">Nueva Contraseña</h2>
            <form method="post">
                {% csrf_token %}
                <div class="text-white mb-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-light w-100 fw-bold">GUARDAR NUEVA CLAVE</button>
            </form>
        </div>
    </div>
</body>
</html>
