
{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicha Barber Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
   
</head>


<body class="back">
    {% include 'partials/header.html' %}

    <main class="d-flex">
    {% block content %}
    {% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    {% block scripts %}{% endblock scripts %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<script src="{% static 'js/sweetalert2.all.min.js' %}"></script>

    {% if messages %}
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          {% for message in messages %}
            // Imprimimos en consola para depurar (puedes borrar esto después)
            console.log("Django envió un mensaje: {{ message|escapejs }}");

            Swal.fire({
              title: "{% if message.tags == 'success' %}¡Completado!{% elif message.tags == 'error' %}¡Ups!{% elif message.tags == 'warning' %}Atención{% else %}Información{% endif %}",
              text: "{{ message|escapejs }}",
              icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
              confirmButtonColor: '#007ca9',
              confirmButtonText: 'Aceptar',
            });
             {% endfor %}
            });
      </script>
    {% endif %}
</body>

</html>
