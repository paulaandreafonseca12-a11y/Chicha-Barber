{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicha Barber Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'img/logo.png' %}" type="image/x-icon">
</head>

<body class="back {% if user.is_authenticated and user.tema == 'light' %}theme-light{% else %}theme-dark{% endif %}">

    {% include 'partials/header.html' %}

    <main class="d-flex flex-column">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <!-- BOTÓN FLOTANTE QUE ABRE EL MODAL -->
    {% if user.is_authenticated %}
    <button type="button" 
            class="btn shadow" 
            data-bs-toggle="modal" 
            data-bs-target="#chatModal"
            style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; background-color: #22aed1; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
        <i class="bi bi-robot fs-3"></i>
    </button>

    <!-- MODAL DEL CHAT IA -->
    <div class="modal fade" id="chatModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #2c2c2c; border: 1px solid #444;">
          <div class="modal-header border-0">
            <h5 class="modal-title text-white"><i class="bi bi-robot text-info"></i> Asistente IA</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="chatForm">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="pregunta" id="pregunta" class="form-control" placeholder="¿En qué te puedo ayudar?" required>
                    <button type="submit" class="btn btn-info">Enviar</button>
                </div>
            </form>
            <div id="resultadoIA" class="mt-3 p-3 bg-dark text-white rounded" style="display:none; min-height: 50px;"></div>
          </div>
        </div>
      </div>
    </div>
    {% endif %}

    <!-- SCRIPT AJAX PARA EL CHAT -->
    <script>
        document.getElementById('chatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultadoDiv = document.getElementById('resultadoIA');
            
            resultadoDiv.style.display = 'block';
            resultadoDiv.innerHTML = "<em>Consultando a la IA...</em>";

            fetch("{% url 'chat_ia' %}", {
                method: 'POST',
                body: formData,
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            })
            .then(response => response.text())
            .then(data => {
                resultadoDiv.innerHTML = "<strong>Respuesta:</strong><br>" + data;
            });
        });
    </script>

    <!-- Tus otros scripts existentes abajo... -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/sweetalert2.all.min.js' %}"></script>
    
    <!-- (Mantén aquí tu script del contador y tus mensajes de Django) -->

</body>
</html>
