{% load static %}
<aside
  class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white shadow-lg"
  style="width: 280px; height: 100vh; overflow-y: auto; position: sticky; top: 0;"
>
  <div class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
    <img src="{% static 'img/logo.png' %}"
         alt="Chicha Barber"
         height="50"
         class="me-2">

    <span class="fs-4 fw-bold">Chicha Barber</span>
</div>
  <hr class="border-secondary" />

  <!-- ENLACE PRINCIPAL AL DASHBOARD -->
  <div class="mb-3">
    <a href="{% url 'inicio_admin' %}" 
       class="d-flex align-items-center px-3 py-2.5 rounded text-decoration-none {% if request.resolver_match.url_name == 'inicio_admin' %}bg-warning text-dark fw-bold{% else %}text-white-50 bg-secondary bg-opacity-10{% endif %}"
       style="font-size: 1rem; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05);">
      <i class="bi bi-speedometer2 me-2 fs-5 {% if request.resolver_match.url_name == 'inicio_admin' %}text-dark{% else %}text-warning{% endif %}"></i>
      <span>Dashboard</span>
    </a>
  </div>

  <div class="accordion accordion-flush bg-dark" id="sidebarAccordion">

    <!-- GESTIÓN DE SERVICIOS -->
    <div class="accordion-item bg-dark border-0">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseServicios">
          <i class="bi bi-gear-wide-connected me-2"></i> Gestión de Servicios
        </button>
      </h2>
      <div id="collapseServicios" class="accordion-collapse collapse {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'listado-admin' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'listado-admin' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-list-ul me-2"></i> Lista de servicios
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- OFERTAS Y PROMOS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'promocion' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'promocion' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapsePromos">
          <i class="bi bi-megaphone me-2"></i> Ofertas y Promos
        </button>
      </h2>
      <div id="collapsePromos" class="accordion-collapse collapse {% if 'promocion' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'listado-promocion' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'listado-promocion' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-list-ul me-2"></i> Lista de promociones
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- CALIFICACIONES -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'calificacion' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'calificacion' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseCalificaciones">
          <i class="bi bi-star me-2"></i> Calificaciones
        </button>
      </h2>
      <div id="collapseCalificaciones" class="accordion-collapse collapse {% if 'calificacion' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'listado-calificacion' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'listado-calificacion' or request.resolver_match.url_name == 'listado_calificaciones_admin' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-list-ul me-2"></i> Lista de calificaciones
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- RESERVAS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'reservas' in request.path or 'agenda' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'reservas' in request.path or 'agenda' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseReservas">
          <i class="bi bi-calendar-event me-2"></i> Reservas
        </button>
      </h2>
      <div id="collapseReservas" class="accordion-collapse collapse {% if 'reservas' in request.path or 'agenda' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'ver_agenda' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'ver_agenda' or request.resolver_match.url_name == 'crear_reserva_admin' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-calendar-check me-2"></i> Ver Agenda
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- PRODUCTOS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'productos' in request.path and 'datos-banco' not in request.path or 'stock' in request.path or 'historial' in request.path or 'registrar-compra' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'productos' in request.path and 'datos-banco' not in request.path or 'stock' in request.path or 'historial' in request.path or 'registrar-compra' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseProductos">
          <i class="bi bi-box-seam me-2"></i> Productos
        </button>
      </h2>
      <div id="collapseProductos" class="accordion-collapse collapse {% if 'productos' in request.path and 'datos-banco' not in request.path or 'stock' in request.path or 'historial' in request.path or 'registrar-compra' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'lista_productos_admin' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'lista_productos_admin' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-list-ul me-2"></i> Lista de productos
            </a>
            <a href="{% url 'lista_stock' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'lista_stock' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-box-seam me-2"></i> Inventario
            </a>
            <a href="{% url 'historial_compras' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'historial_compras' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-search me-2"></i> Historial
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- USUARIOS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'usuarios' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'usuarios' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseUsuarios">
          <i class="bi bi-people me-2"></i> Usuarios
        </button>
      </h2>
      <div id="collapseUsuarios" class="accordion-collapse collapse {% if 'usuarios' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'lista_usuarios' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'lista_usuarios' or request.resolver_match.url_name == 'crear_usuario' or request.resolver_match.url_name == 'editar_usuario' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-person me-2"></i> Lista de usuarios
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- CONFIGURACIÓN -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseConfiguracion">
          <i class="bi bi-gear me-2"></i> Configuración
        </button>
      </h2>
      <div id="collapseConfiguracion" class="accordion-collapse collapse {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'carrusel' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'carrusel' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-images me-2"></i> Carrusel
            </a>
            <a href="{% url 'ver_datos_banco' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'ver_datos_banco' or request.resolver_match.url_name == 'editar_datos_banco' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-bank me-2"></i> Datos Banco
            </a>
            <a href="{% url 'testimonios_admin' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'testimonios_admin' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-chat-quote me-2"></i> Testimonios
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- FACTURAS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'factura' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'factura' in request.path %}text-warning fw-bold{% else %}text-white{% endif %} shadow-none border-0"
          type="button" data-bs-toggle="collapse" data-bs-target="#collapseFacturas">
          <i class="bi bi-receipt me-2"></i> Compras
        </button>
      </h2>
      <div id="collapseFacturas" class="accordion-collapse collapse {% if 'factura' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'factura_adm' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'factura_adm' or request.resolver_match.url_name == 'detalle_factura' %}text-warning fw-bold{% else %}text-white-50{% endif %} border-0 ps-4">
              <i class="bi bi-receipt-cutoff me-2"></i> Lista de Compras
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</aside>
