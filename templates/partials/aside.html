{% load static %}
<aside class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white shadow-lg partials-aside__aside-1">
  <div class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
    <img src="{% static 'img/logo.png' %}"
         alt="Chicha Barber"
         height="50"
         class="me-2">

    <span class="fs-4 fw-bold">Chicha Barber</span>
</div>
  <hr class="border-secondary" />

  <!-- ENLACE PRINCIPAL AL DASHBOARD -->
  <div class="mb-3">
    <a href="{% url 'inicio_admin' %}" class="d-flex align-items-center px-3 py-2.5 rounded text-decoration-none {% if request.resolver_match.url_name == 'inicio_admin' %}color-azul text-white fw-bold{% else %}text-white-50 bg-secondary bg-opacity-10{% endif %} partials-aside__a-2">
      <i class="bi bi-speedometer2 me-2 fs-5 {% if request.resolver_match.url_name == 'inicio_admin' %}text-white{% else %}text-warning{% endif %}"></i>
      <span>Dashboard</span>
    </a>
  </div>

  <div class="accordion accordion-flush bg-dark" id="sidebarAccordion">

    <!-- GESTIÓN DE SERVICIOS -->
    <div class="accordion-item bg-dark border-0">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapseServicios" {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}{% endif %}>
          <i class="bi bi-gear-wide-connected me-2"></i> Gestión de Servicios
        </button>
      </h2>
      <div id="collapseServicios" class="accordion-collapse collapse {% if 'servicios' in request.path and 'promocion' not in request.path and 'calificacion' not in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'listado-admin' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'listado-admin' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'listado-admin' %}color: #22aed1;{% endif %}">
              <i class="bi bi-list-ul me-2"></i> Lista de servicios
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- OFERTAS Y PROMOS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'promocion' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'promocion' in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-5" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePromos" {% if 'promocion' in request.path %}{% endif %}>
          <i class="bi bi-megaphone me-2"></i> Ofertas y Promos
        </button>
      </h2>
      <div id="collapsePromos" class="accordion-collapse collapse {% if 'promocion' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
             <a href="{% url 'listado-promocion' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'listado-promocion' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'listado-promocion' %}color: #22aed1;{% endif %}">
              <i class="bi bi-list-ul me-2"></i> Lista de promociones
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- CALIFICACIONES -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'calificacion' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'calificacion' in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-7" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCalificaciones" {% if 'calificacion' in request.path %}{% endif %}>
          <i class="bi bi-star me-2"></i> Calificaciones
        </button>
      </h2>
      <div id="collapseCalificaciones" class="accordion-collapse collapse {% if 'calificacion' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'listado-calificacion' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'listado-calificacion' or request.resolver_match.url_name == 'listado_calificaciones_admin' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'listado-calificacion' or request.resolver_match.url_name == 'listado_calificaciones_admin' %}color: #22aed1;{% endif %}">
              <i class="bi bi-list-ul me-2"></i> Lista de calificaciones
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- RESERVAS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'reservas' in request.path or 'agenda' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'reservas' in request.path or 'agenda' in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-9" type="button" data-bs-toggle="collapse" data-bs-target="#collapseReservas" {% if 'reservas' in request.path or 'agenda' in request.path %}{% endif %}>
          <i class="bi bi-calendar-event me-2"></i> Reservas
        </button>
      </h2>
      <div id="collapseReservas" class="accordion-collapse collapse {% if 'reservas' in request.path or 'agenda' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'ver_agenda' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'ver_agenda' or request.resolver_match.url_name == 'crear_reserva_admin' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'ver_agenda' or request.resolver_match.url_name == 'crear_reserva_admin' %}color: #22aed1;{% endif %}">
              <i class="bi bi-calendar-check me-2"></i> Ver Agenda
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- PRODUCTOS -->
<div class="accordion-item bg-dark border-0">

    <h2 class="accordion-header">

        <button 
            class="accordion-button bg-dark text-white shadow-none border-0 collapsed partials-aside__button-11"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapseProductos">

            <i class="bi bi-box-seam me-2"></i>
            Productos

        </button>

    </h2>


    <div id="collapseProductos"
         class="accordion-collapse collapse"
         data-bs-parent="#sidebarAccordion">


        <div class="accordion-body p-0">


            <div class="list-group list-group-flush">


                <!-- Lista Productos -->
                <a href="{% url 'lista_productos_admin' %}"
                   class="list-group-item list-group-item-action bg-dark border-0 ps-4
                   {% if request.resolver_match.url_name == 'lista_productos_admin' %}
                   fw-bold
                   {% else %}
                   text-white-50
                   {% endif %}"
                   style="
                   {% if request.resolver_match.url_name == 'lista_productos_admin' %}
                   color:#22aed1;
                   {% endif %}
                   ">

                    <i class="bi bi-list-ul me-2"></i>
                    Lista de Productos

                </a>






                <!-- Categorías -->
                <a href="{% url 'lista_categorias' %}"
                   class="list-group-item list-group-item-action bg-dark border-0 ps-4
                   {% if request.resolver_match.url_name == 'lista_categorias' %}
                   fw-bold
                   {% else %}
                   text-white-50
                   {% endif %}"
                   style="
                   {% if request.resolver_match.url_name == 'lista_categorias' %}
                   color:#22aed1;
                   {% endif %}
                   ">

                    <i class="bi bi-tags me-2"></i>
                    Categorías

                </a>




                <!-- Proveedores -->
                <a href="{% url 'lista_proveedores' %}"
                   class="list-group-item list-group-item-action bg-dark border-0 ps-4
                   {% if request.resolver_match.url_name == 'lista_proveedores' %}
                   fw-bold
                   {% else %}
                   text-white-50
                   {% endif %}"
                   style="
                   {% if request.resolver_match.url_name == 'lista_proveedores' %}
                   color:#22aed1;
                   {% endif %}
                   ">

                    <i class="bi bi-truck me-2"></i>
                    Proveedores

                </a>




                <!-- Inventario -->
                <a href="{% url 'lista_stock' %}"
                   class="list-group-item list-group-item-action bg-dark border-0 ps-4
                   {% if request.resolver_match.url_name == 'lista_stock' %}
                   fw-bold
                   {% else %}
                   text-white-50
                   {% endif %}"
                   style="
                   {% if request.resolver_match.url_name == 'lista_stock' %}
                   color:#22aed1;
                   {% endif %}
                   ">

                    <i class="bi bi-boxes me-2"></i>
                    Inventario

                </a>




                <!-- Compras -->
                <a href="{% url 'historial_compras' %}"
                   class="list-group-item list-group-item-action bg-dark border-0 ps-4
                   {% if request.resolver_match.url_name == 'historial_compras' %}
                   fw-bold
                   {% else %}
                   text-white-50
                   {% endif %}"
                   style="
                   {% if request.resolver_match.url_name == 'historial_compras' %}
                   color:#22aed1;
                   {% endif %}
                   ">

                    <i class="bi bi-cart-check me-2"></i>
                    Compras

                </a>

            </div>

        </div>

    </div>

</div>

    <!-- USUARIOS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'usuarios' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'usuarios' in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-15" type="button" data-bs-toggle="collapse" data-bs-target="#collapseUsuarios" {% if 'usuarios' in request.path %}{% endif %}>
          <i class="bi bi-people me-2"></i> Usuarios
        </button>
      </h2>
      <div id="collapseUsuarios" class="accordion-collapse collapse {% if 'usuarios' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'lista_usuarios' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'lista_usuarios' or request.resolver_match.url_name == 'crear_usuario' or request.resolver_match.url_name == 'editar_usuario' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'lista_usuarios' or request.resolver_match.url_name == 'crear_usuario' or request.resolver_match.url_name == 'editar_usuario' %}color: #22aed1;{% endif %}">
              <i class="bi bi-person me-2"></i> Lista de usuarios
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- CONFIGURACIÓN -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-17" type="button" data-bs-toggle="collapse" data-bs-target="#collapseConfiguracion" {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}{% endif %}>
          <i class="bi bi-gear me-2"></i> Configuración
        </button>
      </h2>
      <div id="collapseConfiguracion" class="accordion-collapse collapse {% if 'configuraciones' in request.path or 'carrusel' in request.path or 'datos-banco' in request.path or 'testimonios' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'carrusel' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'carrusel' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'carrusel' %}color: #22aed1;{% endif %}">
              <i class="bi bi-images me-2"></i> Carrusel
            </a>
            <a href="{% url 'ver_datos_banco' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'ver_datos_banco' or request.resolver_match.url_name == 'editar_datos_banco' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'ver_datos_banco' or request.resolver_match.url_name == 'editar_datos_banco' %}color: #22aed1;{% endif %}">
              <i class="bi bi-bank me-2"></i> Datos Banco
            </a>
            <a href="{% url 'testimonios_admin' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'testimonios_admin' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'testimonios_admin' %}color: #22aed1;{% endif %}">
              <i class="bi bi-chat-quote me-2"></i> Testimonios
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- FACTURAS -->
    <div class="accordion-item bg-dark border-0 ">
      <h2 class="accordion-header">
        <button class="accordion-button {% if 'factura' in request.path %}{% else %}collapsed{% endif %} bg-dark {% if 'factura' in request.path %}text-white fw-bold{% else %}text-white{% endif %} shadow-none border-0 partials-aside__button-21" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFacturas" {% if 'factura' in request.path %}{% endif %}>
          <i class="bi bi-receipt me-2"></i> Comprobantes 
        </button>
      </h2>
      <div id="collapseFacturas" class="accordion-collapse collapse {% if 'factura' in request.path %}show{% endif %}" data-bs-parent="#sidebarAccordion">
        <div class="accordion-body p-0">
          <div class="list-group list-group-flush">
            <a href="{% url 'factura_adm' %}" class="list-group-item list-group-item-action bg-dark {% if request.resolver_match.url_name == 'factura_adm' or request.resolver_match.url_name == 'detalle_factura' %}fw-bold{% else %}text-white-50{% endif %} border-0 ps-4" style="{% if request.resolver_match.url_name == 'factura_adm' or request.resolver_match.url_name == 'detalle_factura' %}color: #22aed1;{% endif %}">
              <i class="bi bi-receipt-cutoff me-2"></i> Lista de comprobantes
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</aside>
