{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicha Barber Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="back">
    <div class="d-flex min-vh-100">
        {% include "partials/aside.html" %}
        <div class="d-flex flex-column flex-grow-1 w-100">
            {% include "partials/header.html" %}
            <main class="container-fluid py-4 overflow-auto">
                {% block content %}
                {% endblock content %}
            </main>
        </div>
    </div>
  
    {% include 'partials/footer.html' %}

    {% block scripts %}{% endblock scripts %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'js/sweetalert2.all.min.js' %}"></script>

    {% if messages %}
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          {% for message in messages %}
            console.log("Django envió un mensaje: {{ message|escapejs }}");
            Swal.fire({
              title: "{% if message.tags == 'success' %}¡Completado!{% elif message.tags == 'error' %}¡Ups!{% elif message.tags == 'warning' %}Atención{% else %}Información{% endif %}",
              text: "{{ message|escapejs }}",
              icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
              confirmButtonColor: '#007ca9',
              confirmButtonText: 'Aceptar',
            });
             {% endfor %}
            });
      </script>
    {% endif %}
</body>
</html>
