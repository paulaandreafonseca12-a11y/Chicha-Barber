{% extends "base-admin.html" %}

{% block content %}
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Eliminar Imagen de Carrusel</h4>
            </div>
            <div class="card-body">
                <p>¿Estás seguro de que deseas eliminar la imagen de carrusel "<strong>{{ carrusel.nombre }}</strong>"?</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'carrusel' %}" class="btn btn-second  ary">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            Eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
