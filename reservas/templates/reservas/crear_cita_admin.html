{% extends "base-admin.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">

<div class="container py-5" style="max-width: 700px;">
    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-warning border-0 shadow-sm">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <div class="card border-0 shadow-sm bg-white">
        <div class="card-header fw-bold text-white py-3" style="background-color: #07d2ff;">
            <i class="bi bi-person-fill me-2"></i>Datos de la Cita
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{% url 'crear_reserva_admin' %}">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-dark small text-uppercase">Nombre del Cliente</label>
                        <input type="text" name="nombre_cliente" class="form-control" placeholder="Nombre completo" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-dark small text-uppercase">Teléfono</label>
                        <input type="text" name="telefono_cliente" class="form-control" placeholder="300 000 0000" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-dark small text-uppercase">Correo Electrónico</label>
                    <input type="email" name="correo_cliente" class="form-control" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-dark small text-uppercase">Fecha y Hora</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-clock text-primary"></i></span>
                        <input type="text" name="fecha_reserva" id="fecha_cita" class="form-control" placeholder="Selecciona fecha y hora" autocomplete="off" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-dark small text-uppercase">Servicio</label>
                    <select name="servicio" class="form-select">
                        {% for servicio in servicios %}
                            <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
                        {% empty %}
                            <option disabled>No hay servicios disponibles</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- BOTONES ALINEADOS A LA DERECHA INFERIOR -->
                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a href="{% url 'ver_agenda' %}" class="btn btn-light border px-4">
                        <i class="bi bi-arrow-left me-1"></i>Regresar
                    </a>
                    <button type="submit" class="btn fw-bold text-white px-4" style="background-color: #07d2ff; border: none;">
                        <i class="bi bi-calendar-check me-1"></i>Guardar Cita
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/es.min.js"></script>
<script>
    flatpickr("#fecha_cita", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        time_24hr: true,
        locale: "es",
        minDate: "today",
        defaultHour: 9,
        minuteIncrement: 15,
    });
</script>
{% endblock %}
