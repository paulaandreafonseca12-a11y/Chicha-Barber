{% extends "base-admin.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">

<div class="container py-4" style="max-width: 700px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #07d2ff;">
            <i class="bi bi-calendar-plus me-2"></i>Registrar Nueva Cita
        </h2>
        <a href="{% url 'ver_agenda' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-warning">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <div class="card border-0 shadow">
        <div class="card-header fw-bold text-white" style="background-color: #07d2ff;">
            <i class="bi bi-person-fill me-2"></i>Datos de la Cita
        </div>
        <div class="card-body">
            <form method="POST" action="{% url 'crear_reserva_admin' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Cliente</label>
                    <input type="text" name="nombre_cliente"
                           class="form-control"
                           placeholder="Nombre completo" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Correo</label>
                    <input type="email" name="correo_cliente"
                           class="form-control"
                           placeholder="correo@ejemplo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Teléfono</label>
                    <input type="text" name="telefono_cliente"
                           class="form-control"
                           placeholder="300 000 0000" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Fecha y Hora</label>
                    <input type="text" name="fecha_reserva" id="fecha_cita"
                           class="form-control"
                           placeholder="Selecciona fecha y hora"
                           autocomplete="off" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Servicio</label>
                    <select name="servicio" class="form-select">
                        {% for servicio in servicios %}
                            <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
                        {% empty %}
                            <option disabled>No hay servicios disponibles</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex gap-3">
                    <a href="{% url 'ver_agenda' %}" class="btn btn-outline-secondary w-50">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                    </a>
                    <button type="submit" class="btn fw-bold text-white w-50"
                            style="background-color: #07d2ff;">
                        <i class="bi bi-calendar-check me-1"></i>Guardar Cita
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/es.min.js"></script>
<script>
    flatpickr("#fecha_cita", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        time_24hr: true,
        locale: "es",
        minDate: "today",
        defaultHour: 9,
        minuteIncrement: 15,
    });
</script>
{% endblock %}
