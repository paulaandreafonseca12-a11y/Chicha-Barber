{% extends "base-admin.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<!-- Eliminamos el tema dark.min.css de Flatpickr para que use el tema claro por defecto -->

<div class="container py-5 px-md-4 reservas-crear-cita-admin__div-1">
    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-warning border-0 shadow-sm">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <!-- Contenedor Principal Adaptado a Tema Blanco -->
    <div class="card text-dark border border-secondary border-opacity-10 shadow bg-white">
        <div class="card-header fw-bold text-primary py-3 bg-light reservas-crear-cita-admin__div-2">
            <i class="bi bi-person-fill me-2"></i>Datos de la Cita
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{% url 'crear_reserva_admin' %}">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Nombre del Cliente</label>
                        <input type="text" name="nombre_cliente" class="form-control custom-white-input" placeholder="Nombre completo" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Teléfono</label>
                        <input type="text" name="telefono_cliente" class="form-control custom-white-input" placeholder="300 000 0000" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small text-uppercase">Correo Electrónico</label>
                    <input type="email" name="correo_cliente" class="form-control custom-white-input" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small text-uppercase">Fecha y Hora</label>
                    <div class="input-group">
                        <span class="input-group-text custom-white-input text-primary border-end-0"><i class="bi bi-clock"></i></span>
                        <input type="text" name="fecha_reserva" id="fecha_cita" class="form-control custom-white-input" placeholder="Selecciona fecha y hora" autocomplete="off" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small text-uppercase">Servicio</label>
                    <select name="servicio" class="form-select custom-white-input">
                        {% for servicio in servicios %}
                            <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
                        {% empty %}
                            <option disabled class="text-muted">No hay servicios disponibles</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- BOTONES ALINEADOS EN TEMA BLANCO -->
                <div class="d-flex justify-content-end gap-2 border-top border-light-subtle pt-3">
                    <a href="{% url 'ver_agenda' %}" class="btn btn-secondary bg-opacity-75 px-4">
                        <i class="bi bi-arrow-left me-1"></i>Regresar
                    </a>
                    <button type="submit" class="btn btn-primary fw-bold px-4 shadow-sm">
                        <i class="bi bi-calendar-check me-1"></i>Guardar Cita
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/es.min.js"></script>
<script>
    flatpickr("#fecha_cita", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        time_24hr: true,
        locale: "es",
        minDate: "today",
        defaultHour: 9,
        minuteIncrement: 15,
    });
</script>

<style>
    /* Elementos de formulario blancos uniformes */
    .custom-white-input {
        background-color: #ffffff !important;
        border: 1px solid #dee2e6 !important;
        color: #212529 !important;
    }
    .custom-white-input:focus {
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
    }
    .custom-white-input::placeholder {
        color: #adb5bd !important;
    }
</style>
{% endblock %}
