{% extends "base-admin.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<!-- Se incluye el tema oscuro oficial de Flatpickr -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/themes/dark.min.css">

<div class="container py-5" style="max-width: 700px;">
    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-warning border-0 shadow-sm">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <!-- Cambio a Tarjeta Oscura con bordes sutiles -->
    <div class="card bg-dark text-white border-secondary shadow-lg">
        <div class="card-header fw-bold text-info py-3" style="background-color: #1a1e21; border-bottom: 1px solid #495057;">
            <i class="bi bi-person-fill me-2"></i>Datos de la Cita
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{% url 'crear_reserva_admin' %}">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-white-50 small text-uppercase">Nombre del Cliente</label>
                        <input type="text" name="nombre_cliente" class="form-control custom-dark-input" placeholder="Nombre completo" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-white-50 small text-uppercase">Teléfono</label>
                        <input type="text" name="telefono_cliente" class="form-control custom-dark-input" placeholder="300 000 0000" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-white-50 small text-uppercase">Correo Electrónico</label>
                    <input type="email" name="correo_cliente" class="form-control custom-dark-input" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-white-50 small text-uppercase">Fecha y Hora</label>
                    <div class="input-group">
                        <span class="input-group-text custom-dark-input text-info border-end-0"><i class="bi bi-clock"></i></span>
                        <input type="text" name="fecha_reserva" id="fecha_cita" class="form-control custom-dark-input" placeholder="Selecciona fecha y hora" autocomplete="off" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-white-50 small text-uppercase">Servicio</label>
                    <select name="servicio" class="form-select custom-dark-input">
                        {% for servicio in servicios %}
                            <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
                        {% empty %}
                            <option disabled class="text-white-50">No hay servicios disponibles</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- BOTONES ALINEADOS EN MODO OSCURO -->
                <div class="d-flex justify-content-end gap-2 border-top border-secondary pt-3">
                    <a href="{% url 'ver_agenda' %}" class="btn btn-outline-light px-4">
                        <i class="bi bi-arrow-left me-1"></i>Regresar
                    </a>
                    <button type="submit" class="btn custom-cyan-btn fw-bold px-4">
                        <i class="bi bi-calendar-check me-1"></i>Guardar Cita
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/es.min.js"></script>
<script>
    flatpickr("#fecha_cita", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        time_24hr: true,
        locale: "es",
        minDate: "today",
        defaultHour: 9,
        minuteIncrement: 15,
    });
</script>

<style>
    /* Elementos de formulario oscuros uniformes */
    .custom-dark-input {
        background-color: #1a1e21 !important;
        border: 1px solid #495057 !important;
        color: #ffffff !important;
    }
    .custom-dark-input:focus {
        border-color: #07d2ff !important;
        box-shadow: 0 0 0 0.25rem rgba(7, 210, 255, 0.25) !important;
    }
    .custom-dark-input::placeholder {
        color: #6c757d !important;
    }
    .custom-dark-input option {
        background-color: #1a1e21;
        color: #fff;
    }
    /* Botón cyan */
    .custom-cyan-btn {
        background-color: #07d2ff;
        color: #1a1e21;
        border: none;
        transition: background-color 0.2s;
    }
    .custom-cyan-btn:hover {
        background-color: #05b5dc;
        color: #ffffff;
    }
</style>
{% endblock %}
