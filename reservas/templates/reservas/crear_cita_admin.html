{% extends "base-admin.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/themes/dark.min.css">

<div class="container" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #d4af37;">
            <i class="bi bi-calendar-plus me-2"></i>Registrar Nueva Cita
        </h2>
        <a href="{% url 'ver_agenda' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Volver a Agenda
        </a>
    </div>

    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-warning mb-3">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <div class="card bg-dark text-white border-secondary shadow">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold text-warning">Nombre del Cliente</label>
                    <input type="text" name="nombre_cliente"
                           class="form-control bg-secondary text-white border-0"
                           placeholder="Nombre completo" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-warning">Correo</label>
                    <input type="email" name="correo_cliente"
                           class="form-control bg-secondary text-white border-0"
                           placeholder="correo@ejemplo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-warning">Teléfono</label>
                    <input type="text" name="telefono_cliente"
                           class="form-control bg-secondary text-white border-0"
                           placeholder="300 000 0000" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-warning">Fecha y Hora</label>
                    <input type="text" name="fecha_reserva" id="fecha_cita"
                           class="form-control bg-secondary text-white border-0"
                           placeholder="Selecciona fecha y hora"
                           autocomplete="off" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-warning">Servicio</label>
                    <select name="servicio" class="form-select bg-secondary text-white border-0">
                        {% for servicio in servicios %}
                            <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
                        {% empty %}
                            <option disabled>No hay servicios disponibles</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex gap-3">
                    <a href="{% url 'ver_agenda' %}" class="btn btn-secondary w-50">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-warning fw-bold text-dark w-50">
                        <i class="bi bi-calendar-check me-1"></i>Guardar Cita
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/es.min.js"></script>
<script>
    flatpickr("#fecha_cita", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        time_24hr: true,
        locale: "es",
        minDate: "today",
        defaultHour: 9,
        minuteIncrement: 15,
    });
</script>
{% endblock %}
