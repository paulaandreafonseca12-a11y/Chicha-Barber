{% extends "base-admin.html" %}

{% block content %}
<div class="container py-4">
    <div class="card bg-dark text-white border-secondary shadow m-auto" style="max-width: 600px;">
        <div class="card-header border-secondary">
            <h3 style="color: #d4af37;">Reprogramar Cita</h3>
            <p class="text-muted">Cliente: {{ cita.nombre_cliente }}</p>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-warning fw-bold">Guardar Cambios</button>
                    <a href="{% url 'ver_agenda' %}" class="btn btn-outline-light">Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
