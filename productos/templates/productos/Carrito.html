{% extends "base-clientes.html" %}
{% load static %}
{% block content %}

<section class="container mt-5">

    <!-- Título de la página -->
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-white text-uppercase">Carrito de Compras</h1>
        <hr class="w-25 mx-auto text-light opacity-50">
    </div>

    <!-- ⏳ TEMPORIZADOR -->
    <div class="alert alert-warning text-center">
        ⏳ Tienes <strong><span id="tiempo">05:00</span></strong> minutos para completar tu compra.
    </div>

    <table class="table table-striped text-center color-blanco">

        <thead class="table-dark">
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla-carrito"></tbody>

    </table>

    <div class="text-end">

        <h4 class="total" style="color: white;">
            Total a pagar:
            <span id="total">$0</span>
        </h4>

        <a href="{% url 'pago' %}" class="btn btn-success mt-3 color-azul">
            Comprar
        </a>

        <a href="{% url 'productos_galeria' %}" class="btn btn-secondary mt-3">
            Seguir Comprando
        </a>

    </div>

</section>

<script>

// =======================
// 🛒 CARRITO
// =======================

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function formatoCOP(valor) {
    return new Intl.NumberFormat('es-CO').format(valor);
}

function mostrarCarrito() {
    const contenedor = document.getElementById("tabla-carrito");
    const totalLabel = document.getElementById("total");
    
    if (!contenedor) return;
    contenedor.innerHTML = "";
    let total = 0;

    if (carrito.length === 0) {
        totalLabel.textContent = "$0";
        localStorage.removeItem("carrito_expiracion");
        return;
    }

    carrito.forEach((producto, index) => {
        let subtotal = producto.precio * producto.cantidad;
        total += subtotal;

        contenedor.innerHTML += `
            <tr class="align-middle">
                <td>${producto.nombre}</td>
                <td>$${formatoCOP(producto.precio)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-light color-azul" onclick="cambiarCantidad(${index}, -1)">-</button>
                    <span class="mx-2">${producto.cantidad}</span>
                    <button class="btn btn-sm btn-outline-light color-azul" onclick="cambiarCantidad(${index}, 1)">+</button>
                </td>
                <td>$${formatoCOP(subtotal)}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="eliminarProducto(${index})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });

    totalLabel.textContent = "$" + formatoCOP(total);

    localStorage.setItem("carrito", JSON.stringify(carrito));
    actualizarContadorGlobal();
}

function cambiarCantidad(index, cambio) {
    carrito[index].cantidad += cambio;
    if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
    mostrarCarrito();
}

function eliminarProducto(index) {
    if(confirm("¿Quitar producto del carrito?")) {
        carrito.splice(index, 1);
        mostrarCarrito();
    }
}

function actualizarContadorGlobal() {
    let total = 0;
    carrito.forEach(p => total += p.cantidad);

    let contador = document.getElementById("contador");
    if (contador) contador.textContent = total;
}

mostrarCarrito();


// =======================
// ⏳ TEMPORIZADOR GLOBAL (TIMESTAMP)
// =======================

function actualizarTiempo() {
    let expiracion = localStorage.getItem("carrito_expiracion");
    let ahora = Date.now();

    // Si hay productos y no hay expiración, crearla (5 min)
    if (carrito.length > 0 && !expiracion) {
        expiracion = ahora + (5 * 60 * 1000);
        localStorage.setItem("carrito_expiracion", expiracion);
    } else if (carrito.length === 0) {
        localStorage.removeItem("carrito_expiracion");
        return;
    }

    let tiempoRestante = Math.ceil((expiracion - ahora) / 1000);

    if (tiempoRestante <= 0) {
        localStorage.removeItem("carrito");
        localStorage.removeItem("carrito_expiracion");
        alert("⏰ Tiempo agotado. Tu carrito ha sido vaciado.");
        location.href = "{% url 'productos_galeria' %}";
        return;
    }

    let minutos = Math.floor(tiempoRestante / 60);
    let segundos = tiempoRestante % 60;

    document.getElementById("tiempo").textContent =
        `${minutos}:${segundos < 10 ? "0" : ""}${segundos}`;
}

actualizarTiempo();
let contador = setInterval(actualizarTiempo, 1000);

</script>

{% endblock content %}
