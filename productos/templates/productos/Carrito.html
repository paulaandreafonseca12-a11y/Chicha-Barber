{% extends "base-clientes.html" %}
{% load static %}
{% block content %}

<section class="container py-5">

  <!-- TÍTULO -->
  <div class="text-center mb-5">
    <h1 class="fw-bold text-white display-4">
      <i class="bi bi-cart3 me-2 color-champaña px-3 py-2 rounded-2 text-dark"></i>
      Carrito de Compras
    </h1>

    <p class="text-light opacity-75">
      Revisa tus productos antes de finalizar la compra.
    </p>
  </div>

  <!-- TABLA -->
  <div class="card border-0 shadow-lg color-negro rounded-4 overflow-hidden">

    <div class="card-header color-champaña text-dark fw-bold py-3">
      <i class="bi bi-bag-check-fill me-2"></i>
      Productos Seleccionados
    </div>

    <div class="table-responsive">
      <table class="table table-dark table-hover text-center align-middle mb-0">

        <thead class="color-azul text-dark">
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tabla-carrito"></tbody>

      </table>
    </div>

  </div>

  <!-- TOTAL -->
  <div class="card mt-4 border-0 shadow-lg rounded-4 color-champaña">

    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-center">

      <h3 class="fw-bold mb-0 text-dark">
        Total:
        <span id="total" class="text-success">$0</span>
      </h3>

      <div class="mt-3 mt-md-0">

        <a href="{% url 'productos_galeria' %}"
           class="btn color-blanco text-dark border border-dark me-2">
          <i class="bi bi-arrow-left-circle me-1"></i>
          Seguir Comprando
        </a>

        <a href="{% url 'pago' %}"
           class="btn color-azuloscuro text-white px-4 border-0">
          <i class="bi bi-credit-card-fill me-1"></i>
          Comprar
        </a>

      </div>

    </div>

  </div>

</section>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* =========================
   FORMATO
========================= */
function formatoCOP(valor) {
  return new Intl.NumberFormat('es-CO').format(valor);
}

/* =========================
   GUARDAR (FIX CLAVE)
========================= */
function guardarCarrito() {
  if (carrito.length === 0) {
    localStorage.removeItem("carrito"); // 💥 limpieza real
  } else {
    localStorage.setItem("carrito", JSON.stringify(carrito));
  }
}

/* =========================
   MOSTRAR
========================= */
function mostrarCarrito() {

  const contenedor = document.getElementById("tabla-carrito");
  const totalLabel = document.getElementById("total");

  contenedor.innerHTML = "";
  let total = 0;

  if (carrito.length === 0) {

    contenedor.innerHTML = `
      <tr>
        <td colspan="5" class="py-5 text-center">
          <i class="bi bi-cart-x display-1 text-secondary"></i>
          <h4 class="mt-3 text-secondary">Tu carrito está vacío</h4>
          <p class="text-muted">Agrega productos para comenzar.</p>
        </td>
      </tr>
    `;

    totalLabel.textContent = "$0";

    guardarCarrito();
    actualizarContadorGlobal();
    return;
  }

  carrito.forEach((p, index) => {

    let subtotal = p.precio * p.cantidad;
    total += subtotal;

    contenedor.innerHTML += `
      <tr>

        <td class="fw-semibold">${p.nombre}</td>

        <td>$${formatoCOP(p.precio)}</td>

        <td>
          <div class="d-flex justify-content-center align-items-center gap-2">

            <button class="btn btn-sm color-champaña text-dark border-0"
              onclick="cambiarCantidad(${index}, -1)">-</button>

            <span class="fw-bold">${p.cantidad}</span>

            <button class="btn btn-sm color-azul text-dark border-0"
              onclick="cambiarCantidad(${index}, 1)">+</button>

          </div>
        </td>

        <td class="fw-bold text-success">
          $${formatoCOP(subtotal)}
        </td>

        <td>
          <button class="btn btn-sm color-azuloscuro text-white border-0"
            onclick="eliminarProducto(${index})">
            <i class="bi bi-trash-fill"></i>
          </button>
        </td>

      </tr>
    `;
  });

  totalLabel.textContent = "$" + formatoCOP(total);

  guardarCarrito();
  actualizarContadorGlobal();
}

/* =========================
   CAMBIAR CANTIDAD
========================= */
function cambiarCantidad(index, cambio) {

  carrito[index].cantidad += cambio;

  if (carrito[index].cantidad <= 0) {
    carrito.splice(index, 1);
  }

  mostrarCarrito();
}

/* =========================
   ELIMINAR
========================= */
function eliminarProducto(index) {

  if (confirm("¿Eliminar este producto?")) {
    carrito.splice(index, 1);
    mostrarCarrito();
  }
}

/* =========================
   CONTADOR GLOBAL HEADER
========================= */
function actualizarContadorGlobal() {

  let total = 0;

  carrito.forEach(p => total += p.cantidad);

  let contador = document.getElementById("contador");

  if (!contador) return;

  if (total > 0) {
    contador.textContent = total;
    contador.style.display = "inline-block";
  } else {
    contador.style.display = "none";
  }
}

/* INIT */
mostrarCarrito();

</script>

{% endblock content %}
