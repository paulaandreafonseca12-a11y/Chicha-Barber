{% extends "base-clientes.html" %}
{% load static %}
{% block content %}

<section class="container mt-5">

    <!-- Título de la página -->
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-white text-uppercase">Carrito de Compras</h1>
        <hr class="w-25 mx-auto text-light opacity-50">
    </div>

    <!-- ⏳ TEMPORIZADOR -->
    <div class="alert alert-warning text-center">
        ⏳ Tienes <strong><span id="tiempo">05:00</span></strong> minutos para completar tu compra.
    </div>

    <table class="table table-striped text-center color-blanco">

        <thead class="table-dark">
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla-carrito"></tbody>

    </table>

    <div class="text-end">

        <h4 class="total" style="color: white;">
            Total a pagar:
            <span id="total">$0</span>
        </h4>

        <a href="{% url 'pago' %}" class="btn btn-success mt-3 color-azul">
            Comprar
        </a>

        <a href="{% url 'productos_galeria' %}" class="btn btn-secondary mt-3">
            Seguir Comprando
        </a>

    </div>

</section>

<script>

// =======================
// 🛒 CARRITO
// =======================

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function formatoCOP(valor) {
    return new Intl.NumberFormat('es-CO').format(valor);
}

function mostrarCarrito() {
    const contenedor = document.getElementById("contenedor-items-carrito");
    const vacio = document.getElementById("carrito-vacio");
    const subtotalLabel = document.getElementById("resumen-subtotal");
    const totalLabel = document.getElementById("total");
    
    contenedor.innerHTML = "";
    let total = 0;

    if (carrito.length === 0) {
        vacio.classList.remove("d-none");
        subtotalLabel.textContent = "$0";
        totalLabel.textContent = "$0";
        return;
    }

    vacio.classList.add("d-none");

    carrito.forEach((producto, index) => {
        let subtotal = producto.precio * producto.cantidad;
        total += subtotal;

        contenedor.innerHTML += `
            <div class="col-md-6">
                <div class="card card-item-carrito h-100 shadow border-0 bg-white rounded-4 overflow-hidden">
                    <div class="row g-0">
                        <div class="col-4">
                            <img src="${producto.imagen || '{% static "img/logo.png" %}'}" 
                                 class="img-fluid h-100" style="object-fit: cover; min-height: 120px;">
                        </div>
                        <div class="col-8">
                            <div class="card-body p-3 d-flex flex-column h-100">
                                <h6 class="fw-bold text-dark mb-1">${producto.nombre}</h6>
                                <p class="color-azul fw-bold mb-2">$${formatoCOP(producto.precio)}</p>
                                
                                <div class="d-flex justify-content-between align-items-center mt-auto">
                                    <div class="btn-group btn-group-sm bg-light rounded-pill px-1">
                                        <button class="btn btn-sm text-dark border-0" onclick="cambiarCantidad(${index}, -1)">-</button>
                                        <span class="px-2 fw-bold align-self-center">${producto.cantidad}</span>
                                        <button class="btn btn-sm text-dark border-0" onclick="cambiarCantidad(${index}, 1)">+</button>
                                    </div>
                                    <button class="btn btn-outline-danger btn-sm border-0" onclick="eliminarProducto(${index})">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });

    subtotalLabel.textContent = "$" + formatoCOP(total);
    totalLabel.textContent = "$" + formatoCOP(total);

    localStorage.setItem("carrito", JSON.stringify(carrito));
    actualizarContadorGlobal();
}

function cambiarCantidad(index, cambio) {
    carrito[index].cantidad += cambio;
    if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
    mostrarCarrito();
}

function eliminarProducto(index) {
    if(confirm("¿Quitar producto del carrito?")) {
        carrito.splice(index, 1);
        mostrarCarrito();
    }
}

function actualizarContadorGlobal() {
    let total = 0;
    carrito.forEach(p => total += p.cantidad);

    let contador = document.getElementById("contador");
    if (contador) contador.textContent = total;
}

mostrarCarrito();


// =======================
// ⏳ TEMPORIZADOR CORREGIDO
// =======================

// 🔥 Obtener tiempo guardado
let tiempoGuardado = localStorage.getItem("tiempo_carrito");

// 🔥 CORRECCIÓN CLAVE
if (!tiempoGuardado || parseInt(tiempoGuardado) <= 0) {
    tiempoRestante = 300; // 5 minutos
    localStorage.setItem("tiempo_carrito", tiempoRestante);
} else {
    tiempoRestante = parseInt(tiempoGuardado);
}

function actualizarTiempo() {
    let minutos = Math.floor(tiempoRestante / 60);
    let segundos = tiempoRestante % 60;

    document.getElementById("tiempo").textContent =
        `${minutos}:${segundos < 10 ? "0" : ""}${segundos}`;

    if (tiempoRestante <= 0) {
        clearInterval(contador);

        // 🔥 AHORA SOLO SE EJECUTA CUANDO LLEGA A 0 EN VIVO
        localStorage.removeItem("carrito");
        localStorage.removeItem("tiempo_carrito");

        alert("⏰ Tiempo agotado. Tu carrito ha sido vaciado.");
        location.reload();
    }

    tiempoRestante--;
    localStorage.setItem("tiempo_carrito", tiempoRestante);
}

let contador = setInterval(actualizarTiempo, 1000);

</script>

{% endblock content %}
