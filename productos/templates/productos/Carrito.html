{% extends "base-clientes.html" %}
{% load static %}
{% block content %}

<section class="container mt-5">

    <div class="p-5 mb-4 bg-body-tertiary rounded-3 opacity-60 shadow-sm text-center bg-light border border-1 border-light">
        <div class="container-fluid py-1">
            <h1 class="display-5 fw-bold">Carrito de compras </h1> 
        </div>
    </div>

    <!-- ⏳ TEMPORIZADOR -->
    <div class="alert alert-warning text-center">
        ⏳ Tienes <strong><span id="tiempo">05:00</span></strong> minutos para completar tu compra.
    </div>

    <table class="table table-striped text-center">

        <thead class="table-dark">
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla-carrito"></tbody>

    </table>

    <div class="text-end">

        <h4 class="total" style="color: white;">
            Total a pagar:
            <span id="total">$0</span>
        </h4>

        <a href="{% url 'pago' %}" class="btn btn-success mt-3">
            Comprar
        </a>

        <a href="{% url 'productos_galeria' %}" class="btn btn-secondary mt-3">
            Seguir Comprando
        </a>

    </div>

</section>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

// 🔥 FORMATEAR PRECIO
function formatoCOP(valor) {
    return new Intl.NumberFormat('es-CO').format(valor);
}

function mostrarCarrito() {

    let tabla = document.getElementById("tabla-carrito");
    tabla.innerHTML = "";

    let total = 0;

    if (carrito.length === 0) {
        tabla.innerHTML = `
            <tr>
                <td colspan="5">🛒 Tu carrito está vacío</td>
            </tr>
        `;
        document.getElementById("total").textContent = "$0";
        return;
    }

    carrito.forEach((producto, index) => {

        let subtotal = producto.precio * producto.cantidad;
        total += subtotal;

        tabla.innerHTML += `
            <tr>
                <td>${producto.nombre}</td>
                <td>$${formatoCOP(producto.precio)}</td>

                <td>
                    <button class="btn btn-sm btn-dark"
                        onclick="cambiarCantidad(${index}, -1)">-</button>

                    ${producto.cantidad}

                    <button class="btn btn-sm btn-dark"
                        onclick="cambiarCantidad(${index}, 1)">+</button>
                </td>

                <td>$${formatoCOP(subtotal)}</td>

                <td>
                    <button class="btn btn-danger btn-sm"
                        onclick="eliminarProducto(${index})">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("total").textContent = "$" + formatoCOP(total);

    localStorage.setItem("carrito", JSON.stringify(carrito));
    actualizarContadorGlobal();
}

// 🔥 CAMBIAR CANTIDAD
function cambiarCantidad(index, cambio) {
    carrito[index].cantidad += cambio;

    if (carrito[index].cantidad <= 0) {
        carrito.splice(index, 1);
    }

    mostrarCarrito();
}

// 🔥 ELIMINAR
function eliminarProducto(index) {
    carrito.splice(index, 1);
    mostrarCarrito();
}

// 🔥 CONTADOR GLOBAL (si lo tienes en navbar)
function actualizarContadorGlobal() {
    let total = 0;
    carrito.forEach(p => total += p.cantidad);

    let contador = document.getElementById("contador");
    if (contador) contador.textContent = total;
}

mostrarCarrito();


// ⏳ TEMPORIZADOR REAL (persistente)
let tiempoRestante = localStorage.getItem("tiempo_carrito");

if (!tiempoRestante) {
    tiempoRestante = 300;
} else {
    tiempoRestante = parseInt(tiempoRestante);
}

function actualizarTiempo() {
    let minutos = Math.floor(tiempoRestante / 60);
    let segundos = tiempoRestante % 60;

    document.getElementById("tiempo").textContent =
        `${minutos}:${segundos < 10 ? "0" : ""}${segundos}`;

    if (tiempoRestante <= 0) {
        clearInterval(contador);

        localStorage.removeItem("carrito");
        localStorage.removeItem("tiempo_carrito");

        alert("⏰ Tiempo agotado. Tu carrito ha sido vaciado.");
        location.reload();
    }

    tiempoRestante--;
    localStorage.setItem("tiempo_carrito", tiempoRestante);
}

let contador = setInterval(actualizarTiempo, 1000);

</script>

{% endblock content %}
