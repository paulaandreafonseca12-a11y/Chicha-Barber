{% extends 'base-admin.html' %}

{% block content %}
<div class="container-fluid py-4" style="background-color: #1a1d20; min-height: 100vh;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-warning fw-bold">
            <i class="bi bi-trash me-2"></i>Eliminar Producto
        </h2>
        <a href="{% url 'productos:lista_productos_admin' %}" class="btn btn-outline-warning">
            <i class="bi bi-arrow-left me-2"></i>Volver al Inventario
        </a>
    </div>

    <div class="card bg-dark text-white border-danger shadow" style="max-width: 500px;">
        <div class="card-body text-center py-5">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
            <h4>¿Estás seguro de eliminar este producto?</h4>
            <p class="text-muted mt-2">
                <strong class="text-white">{{ producto.nombre }}</strong> — ${{ producto.precio_venta }}
            </p>
            <p class="text-danger small">Esta acción no se puede deshacer.</p>
            <div class="d-flex justify-content-center gap-3 mt-4">
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger fw-bold px-4">
                        <i class="bi bi-trash me-2"></i>Sí, eliminar
                    </button>
                </form>
                <a href="{% url 'productos:lista_productos_admin' %}" class="btn btn-outline-light px-4">
                    Cancelar
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
