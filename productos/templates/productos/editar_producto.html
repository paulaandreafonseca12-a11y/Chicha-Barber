{% extends 'base-admin.html' %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #07d2ff;">
            <i class="bi bi-pencil me-2"></i>Editar Producto
        </h2>
        <a href="{% url 'lista_productos_admin' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Volver al Inventario
        </a>
    </div>

    <div class="card border-0 shadow">
        <div class="card-header fw-bold text-white" style="background-color: #07d2ff;">
            <i class="bi bi-box-seam me-2"></i>Datos del Producto
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="d-flex gap-3 mt-4">
                    <a href="{% url 'lista_productos_admin' %}" class="btn btn-outline-secondary w-50">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                    </a>
                    <button type="submit" class="btn fw-bold text-white w-50"
                            style="background-color: #07d2ff;">
                        <i class="bi bi-save me-1"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
