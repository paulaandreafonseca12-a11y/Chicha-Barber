{% extends 'base-admin.html' %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">

    <div class="card border-0 shadow">

        <!-- HEADER CON BOTÓN -->
        <div class="card-header d-flex justify-content-between align-items-center text-white"
             style="background-color: #07d2ff;">

            <span class="fw-bold">
                <i class="bi bi-box-seam me-2"></i>Nuevo Producto
            </span>

                    <a href="{% url 'lista_productos_admin' %}" 
                             class="btn btn-sm text-white fw-bold color-azul ">
               
                            <i></i>Volver
                    </a>
        </div>

        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="d-flex gap-3 mt-4">
                    <a href="{% url 'lista_productos_admin' %}" class="btn btn-outline-secondary w-50">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                    </a>
                    <button type="submit" class="btn fw-bold text-white w-50"
                            style="background-color: #07d2ff;">
                        <i class="bi bi-save me-1"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
