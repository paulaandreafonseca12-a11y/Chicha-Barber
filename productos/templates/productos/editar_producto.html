{% extends 'base-admin.html' %}

{% block content %}
<div class="container-fluid py-4" style="background-color: #1a1d20; min-height: 100vh;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-warning fw-bold">
            <i class="bi bi-pencil me-2"></i>Editar Producto: {{ producto.nombre }}
        </h2>
        <a href="{% url 'productos:lista_productos_admin' %}" class="btn btn-outline-warning">
            <i class="bi bi-arrow-left me-2"></i>Volver al Inventario
        </a>
    </div>

    <div class="card bg-dark text-white border-secondary shadow" style="max-width: 600px;">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-warning fw-bold px-4">
                        <i class="bi bi-save me-2"></i>Guardar Cambios
                    </button>
                    <a href="{% url 'productos:lista_productos_admin' %}" class="btn btn-outline-light">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
