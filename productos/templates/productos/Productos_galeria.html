{% extends "base-clientes.html" %}
{% load static %}

{% block content %}

<section class="container mt-5">

    <h2 class="text-center mb-5 titulo-productos">
        Productos de Cuidado Personal
    </h2>
    <a href="{% url "carrito" %}" class="btn btn-warning me-3">
        Carrito (<span id="contador">0</span>)
    </a>          

    <div class="row g-4">

        {% for producto in productos %}
        <div class="col-md-4">
            <div class="card shadow">

                <img src="{% static 'img/Aceite.jpg' %}" class="card-img-top">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        {{ producto.nombre }}
                    </h5>

                    <p class="card-text">
                        {{ producto.descripcion }}
                    </p>

                    <p class="precio">
                        ${{ producto.precio_venta }} COP
                    </p>

                    <button class="btn btn-dark"
                        onclick="agregarCarrito({{ producto.codigo_producto }}, '{{ producto.nombre }}', {{ producto.precio_venta }})">
                        Agregar al carrito
                    </button>

                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</section>

<script>

function agregarCarrito(id, nombre, precio) {

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    let productoExistente = carrito.find(p => p.id === id);

    if (productoExistente) {
        productoExistente.cantidad++;
    } else {
        carrito.push({
            id: id,
            nombre: nombre,
            precio: precio,
            cantidad: 1
        });
    }

    localStorage.setItem("carrito", JSON.stringify(carrito));

    actualizarContador();

    alert("Producto agregado al carrito");
}

function actualizarContador() {

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    let total = 0;

    carrito.forEach(p => {
        total += p.cantidad;
    });

    document.getElementById("contador").textContent = total;
}

actualizarContador();

</script>

{% endblock content %}
