{% extends "base-chat.html" %}

{% block content %}
<div class="card shadow-lg border-0 bg-dark text-light overflow-hidden">
    <!-- Encabezado con botones de control -->
    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center py-2">
        <span class="fw-bold"><i class="bi bi-robot"></i> Asistente IA</span>
        <div>
            <button type="button" onclick="minimizarChat()" class="btn btn-sm text-white p-1"><i class="bi bi-dash-lg"></i></button>
            <button type="button" onclick="cerrarChat()" class="btn btn-sm text-white p-1"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <!-- Cuerpo del chat (ID necesario para el script) -->
    <div id="chatBody" class="card-body" style="height: 300px; overflow-y: auto;">
        {% if respuesta %}
            <div class="p-2 mb-2 bg-secondary rounded small">
                {{ respuesta|linebreaksbr }}
            </div>
        {% else %}
            <p class="text-muted text-center small mt-5">¿Cómo puedo ayudarte hoy en Chicha Barber?</p>
        {% endif %}
    </div>

    <!-- Formulario -->
    <div class="card-footer bg-dark border-0 p-2">
        <form method="POST" class="input-group">
            {% csrf_token %}
            <input type="text" name="pregunta" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Escribe tu consulta..." required>
            <button type="submit" class="btn btn-sm btn-info text-white"><i class="bi bi-send-fill"></i></button>
        </form>
    </div>
</div>
{% endblock content %}
