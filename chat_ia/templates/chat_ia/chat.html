{% extends "base-clientes.html" %}
{% load static %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <div class="chat-window" style="background-color: #e5ddd5; border-radius: 15px; padding: 20px; min-height: 400px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #ccc;">
        
        <!-- Respuesta de la IA -->
        {% if respuesta %}
        <div class="message-ai" style="align-self: flex-start; background-color: #ffffff; padding: 12px 18px; border-radius: 0 15px 15px 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); max-width: 85%;">
            <small class="text-muted d-block mb-1" style="font-size: 0.75rem;">Chicha Bot</small>
            <p class="mb-0" style="color: #333; line-height: 1.4;">{{ respuesta|linebreaksbr }}</p>
        </div>
        {% else %}
        <div class="text-center text-muted mt-5">
            <i class="bi bi-chat-dots fs-1"></i>
            <p>¡Hola! ¿En qué puedo ayudarte hoy en Chicha Barber?</p>
        </div>
        {% endif %}
    </div>

    <!-- Formulario de envío -->
    <form method="POST" class="mt-3 d-flex gap-2">
        {% csrf_token %}
        <input type="text" name="pregunta" class="form-control rounded-pill shadow-sm" placeholder="Escribe un mensaje..." required autofocus>
        <button type="submit" class="btn btn-success rounded-pill px-4 shadow-sm">
            <i class="bi bi-send-fill"></i>
        </button>
    </form>
</div>
{% endblock content %}
